<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARBONsnaps — Environmental Commodity Intelligence — 2026-03-23</title>
<meta name="description" content="Weekly environmental commodity intelligence across 8 instruments. Carbon markets, clean fuel credits, voluntary offsets.">
<meta property="og:type" content="website">
<meta property="og:title" content="CARBONsnaps: Environmental Commodity Intelligence">
<meta property="og:description" content="Weekly environmental commodity intelligence across 8 instruments.">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="CARBONsnaps: Environmental Commodity Intelligence">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ── Design tokens ── */
:root{
  --green:#00c896;
  --green-dim:rgba(0,200,150,.18);
  --green-faint:rgba(0,200,150,.08);
  --hot:#ff4d6a;
  --gold:#f0b429;
  --slate:#7c9cbf;
  --slate-dim:rgba(124,156,191,.15);
  --bg:#091426;
  --bg-card:#0d1b2e;
  --bg-card-hover:#111f37;
  --border:rgba(255,255,255,.07);
  --border-strong:rgba(255,255,255,.13);
  --text-hi:#dde8f0;
  --text-mid:#8a9bb0;
  --text-lo:#445566;
  --font-display:'Space Mono',monospace;
  --font-body:'DM Sans',sans-serif;
  /* family accent colours */
  --compliance:#00c896;
  --cleanfuel:#f0b429;
  --voluntary:#7c9cbf;
}

html{background:var(--bg);color:var(--text-hi);font-family:var(--font-body)}
body{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}

/* ── Top bar ── */
.top-bar{
  display:flex;align-items:center;justify-content:center;
  padding:30px 24px;position:relative;z-index:20;
  border-bottom:1px solid var(--border-strong);flex-shrink:0;
  background:var(--bg);
}
.logo{
  position:absolute;left:24px;
  font-family:var(--font-display);font-size:16px;letter-spacing:2.5px;
  color:var(--green);text-transform:uppercase;line-height:1.4;
  cursor:pointer;
}
.logo .logo-sub{
  display:block;font-family:var(--font-body);font-size:11px;
  letter-spacing:1.8px;color:var(--text-lo);text-transform:uppercase;
  font-weight:400;margin-top:1px;
}

.top-bar-right{
  position:absolute;right:24px;
  font-family:var(--font-display);font-size:9px;letter-spacing:1px;
  color:var(--text-lo);text-transform:uppercase;text-align:right;line-height:1.6;
}
.top-bar-date{color:var(--text-lo)}
.top-bar-edition{color:var(--green);font-size:8px;letter-spacing:1.5px}

/* ── Main scroll area ── */
#main-views{flex:1;overflow-y:auto;padding-bottom:60px}

/* ── Section scaffold ── */
.cs-section{width:100%;max-width:960px;margin:0 auto;padding:28px 20px 0}
.cs-section-header{
  display:flex;align-items:baseline;gap:12px;justify-content:center;
  margin-bottom:18px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.cs-section-title{
  font-family:var(--font-display);font-size:11px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--green);
}
.cs-section-meta{
  font-family:var(--font-display);font-size:9px;letter-spacing:1px;
  text-transform:uppercase;color:var(--text-lo);
}

/* ── Weekly briefing icons ── */
.briefing-icons{
  display:flex;gap:48px;justify-content:center;align-items:center;
  padding:14px 0 6px;position:relative;z-index:5;
}
.brief-icon{
  position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;transition:transform .2s;
}
.brief-icon:hover{transform:translateY(-3px)}
.brief-icon .bi-emoji{font-size:32px;filter:grayscale(.15);transition:filter .2s,transform .2s}
.brief-icon:hover .bi-emoji{filter:none;transform:scale(1.15)}
.brief-icon .bi-label{
  font-family:var(--font-display);font-size:8px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--text-lo);transition:color .25s;white-space:nowrap;
}
.brief-icon:hover .bi-label{color:var(--green)}
.brief-icon::after{
  content:'';width:3px;height:3px;border-radius:50%;
  background:rgba(255,255,255,.2);transition:background .2s;
}
.brief-icon:hover::after{background:var(--green)}

/* ── Briefing floating tooltip ── */
.brief-tooltip{
  visibility:hidden;pointer-events:none;
  position:fixed;
  transform:translateX(-50%);
  background:rgba(9,20,38,.98);
  border:1px solid var(--green);border-radius:8px;
  padding:20px 20px 16px;z-index:1001;width:90%;max-width:420px;
  max-height:70vh;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,200,150,.25);
  transition:opacity .15s ease-out;
  opacity:0;
}
.brief-tooltip::-webkit-scrollbar{width:4px}
.brief-tooltip::-webkit-scrollbar-track{background:transparent}
.brief-tooltip::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.brief-tooltip.active{
  visibility:visible;pointer-events:auto;
  opacity:1;
}
.brief-overlay{
  display:none;position:fixed;inset:0;
  z-index:1000;background:rgba(0,0,0,.72);
}
.brief-overlay.active{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.bt-close{
  position:absolute;top:12px;right:12px;width:28px;height:28px;
  background:rgba(255,255,255,.08);border:1px solid #333;border-radius:50%;
  color:#aaa;font-size:14px;line-height:28px;text-align:center;
  cursor:pointer;transition:all .2s;z-index:10;
}
.bt-close:hover{background:rgba(255,255,255,.15);color:#fff;border-color:#555}

.bt-title{
  font-size:15px;font-weight:700;color:var(--green);
  margin-bottom:10px;padding-right:40px;
  font-family:var(--font-body);letter-spacing:.5px;
}
.bt-body{
  font-size:13px;color:var(--text-hi);line-height:1.68;
  margin-bottom:10px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
  min-height:120px;
}
.bt-body p{margin:0 0 11px}
.bt-body p:last-child{margin-bottom:0}
.bt-separator{
  border:none;border-top:1px solid var(--border);
  margin:10px 0 12px;
}
.bt-source{
  font-family:var(--font-body);font-size:11px;
  color:var(--text-mid);font-style:italic;
  padding-top:10px;border-top:1px solid var(--border);
}

/* ── Instrument table box ── */
.inst-box{
  max-width:480px;margin:16px auto 0;
  background:var(--bg-card);
  border:1px solid var(--border-strong);
  border-radius:6px;overflow:hidden;
}
.inst-table{width:100%;border-collapse:collapse;}
.inst-table-family{
  font-family:var(--font-display);font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:var(--text-hi);font-weight:700;
  padding:10px 16px 7px;
  border-bottom:1px solid var(--border);
}
.inst-table-family-pip{
  display:inline-block;width:5px;height:5px;border-radius:50%;
  margin-right:8px;vertical-align:middle;
}
.inst-row{
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.inst-row:last-child{border-bottom:none}
.inst-row:hover{background:rgba(255,255,255,.04)}

.inst-row td{padding:9px 6px;vertical-align:middle;}
.inst-row td+td{border-left:1px solid var(--border);}
.inst-row:hover .it-name{color:var(--text-hi)}
.it-id{
  font-family:var(--font-display);font-size:11px;font-weight:700;
  letter-spacing:.5px;white-space:nowrap;width:44px;padding-left:8px;
}
.it-name{
  font-family:var(--font-body);font-size:12px;
  color:var(--text-mid);transition:color .15s;
  width:60%;
}
.it-price-cell{
  text-align:center;white-space:nowrap;padding-right:6px;padding-left:6px;
  width:86px;max-width:86px;overflow:hidden;
}
.it-price{
  font-family:var(--font-display);font-size:12px;font-weight:700;
  letter-spacing:-.3px;color:var(--text-hi);
}
.it-price.no-data{font-size:10px;color:var(--text-lo)}
.it-unit{
  font-family:var(--font-display);font-size:7px;letter-spacing:.3px;
  text-transform:uppercase;color:var(--text-lo);
  display:block;margin-top:1px;
}
.it-signal{
  text-align:center;width:68px;padding-left:6px;padding-right:6px;
}
.it-range-cell{
  width:110px;padding-left:8px;padding-right:8px;vertical-align:middle;
}
.it-range-wrap{
  width:100%;
}
.it-range-track{
  position:relative;height:3px;
  background:var(--border-strong);
  border-radius:2px;width:100%;
}
.it-range-dot{
  position:absolute;top:50%;
  transform:translate(-50%,-50%);
  width:7px;height:7px;border-radius:50%;
  background:var(--text-hi);
  box-shadow:0 0 4px rgba(255,255,255,.3);
}
.it-range-labels{
  display:flex;justify-content:space-between;
  margin-top:4px;
  font-family:var(--font-display);font-size:7px;
  letter-spacing:.3px;color:var(--text-lo);
  line-height:1;
}
.it-range-labels .it-range-mid{color:var(--text-lo);opacity:.6}
.it-range-unavail{
  font-family:var(--font-display);font-size:7px;
  letter-spacing:.5px;text-transform:uppercase;
  color:var(--text-lo);opacity:.4;
}

/* ── Story tooltip ── */
.story-tooltip{
  position:fixed;z-index:1001;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:420px;max-width:calc(100vw - 24px);
  background:#0d1d32;
  border:1px solid rgba(0,200,150,.3);
  border-radius:6px;
  box-shadow:0 8px 40px rgba(0,0,0,.7),0 0 0 1px rgba(0,200,150,.05);
  padding:0;overflow:hidden;
  animation:ttIn .15s ease-out;
}
@keyframes ttIn{from{opacity:0;transform:translate(-50%,-46%)}to{opacity:1;transform:translate(-50%,-50%)}}
.st-header{
  background:rgba(0,200,150,.06);
  border-bottom:1px solid rgba(0,200,150,.15);
  padding:14px 16px 12px;position:relative;
}
.st-title-row{
  display:flex;align-items:center;gap:8px;margin-bottom:4px;padding-right:32px;
}
.st-id{
  font-family:var(--font-body);font-size:14px;font-weight:700;
  letter-spacing:.5px;color:var(--text-hi);
}
.st-name{
  font-family:var(--font-body);font-size:12px;color:var(--text-mid);
  flex:1;
}
.st-meta{
  font-family:var(--font-display);font-size:9px;letter-spacing:.8px;
  text-transform:uppercase;color:var(--text-lo);
}
.st-close{
  position:absolute;top:12px;right:12px;
  background:none;border:none;cursor:pointer;
  font-size:13px;color:var(--text-lo);padding:4px;
  transition:color .15s;
}
.st-close:hover{color:var(--text-hi)}

.st-body{
  padding:16px;font-family:var(--font-body);font-size:13px;
  line-height:1.68;color:var(--text-hi);
  max-height:220px;overflow-y:auto;
}
.st-body p{margin:0 0 11px}
.st-body p:last-child{margin-bottom:0}
.st-body::-webkit-scrollbar{width:4px}
.st-body::-webkit-scrollbar-track{background:transparent}
.st-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.st-footer{
  padding:10px 16px;font-family:var(--font-body);font-size:11px;
  color:var(--text-lo);border-top:1px solid var(--border);
  font-style:italic;
}
.st-spark-wrap{
  padding:10px 16px 0;
  border-bottom:1px solid var(--border);
  height:126px;position:relative;
}
.st-spark{display:block}
.st-spark-hover{
  display:none;position:absolute;pointer-events:none;
  top:10px;bottom:1px;width:1px;
  background:rgba(255,255,255,0.15);
}
.st-spark-hover-pill{
  position:absolute;left:6px;top:0;
  background:#0d1d32;border:1px solid rgba(255,255,255,0.18);
  border-radius:3px;padding:3px 7px;white-space:nowrap;
  font-family:var(--font-display);font-size:10px;letter-spacing:.4px;
  color:var(--text-hi);line-height:1.5;pointer-events:none;
}
.st-spark-hover-pill .shp-price{color:var(--green)}
.st-spark-hover-pill .shp-date{color:var(--text-lo);font-size:9px;display:block}

/* ── Regulatory table ── */
.reg-box{
  max-width:660px;margin:0 auto;
  background:var(--bg-card);
  border:1px solid var(--border-strong);
  border-radius:6px;overflow:hidden;
}
.reg-table-wrap{overflow:hidden}
.reg-table{
  width:100%;border-collapse:collapse;
  font-family:var(--font-body);font-size:12px;
}
.reg-table thead th{
  font-family:var(--font-display);font-size:11px;letter-spacing:1px;
  text-transform:uppercase;color:var(--text-mid);
  padding:9px 8px;text-align:center;font-weight:700;
  border-bottom:1px solid var(--border);white-space:nowrap;
  cursor:pointer;user-select:none;transition:color .15s;
  background:rgba(0,200,150,.07);
}
.reg-table thead th:hover{color:var(--text-mid)}
.reg-table thead th.sort-active{color:var(--green)}
.reg-th-inner{display:flex;flex-direction:column;align-items:center;gap:3px}
.reg-th-icon{font-size:18px;line-height:1}
.reg-th-label{font-size:8px;letter-spacing:1px}
.reg-sort-arrow{font-size:7px;opacity:.4;transition:opacity .15s;margin-top:1px}
.reg-table thead th.sort-active .reg-sort-arrow{opacity:1;color:var(--green)}
.reg-table tbody tr{
  border-bottom:1px solid var(--border);
  transition:background .15s;
}
.reg-table tbody tr:hover{background:rgba(255,255,255,.03)}
.reg-table td{
  padding:10px 10px;color:var(--text-hi);vertical-align:top;
  border-right:1px solid var(--border);
}
.reg-table td:last-child{border-right:none}
.reg-table thead th{
  border-right:1px solid var(--border);
}
.reg-table thead th:last-child{border-right:none}
.reg-date{
  font-family:var(--font-display);font-size:10px;letter-spacing:.3px;
  color:var(--text-mid);white-space:nowrap;
  line-height:1;vertical-align:middle;
}
.reg-date-main{
  display:block;font-family:var(--font-display);font-size:10px;
  letter-spacing:.3px;color:var(--text-mid);white-space:nowrap;
}
.reg-date-rel{
  display:block;font-family:var(--font-display);font-size:8px;
  letter-spacing:.4px;color:var(--text-lo);margin-top:4px;white-space:nowrap;
}
/* urgency tiers */
.reg-date-urgent  .reg-date-main{color:var(--hot)}
.reg-date-urgent  .reg-date-rel{color:var(--hot);opacity:.75}
.reg-date-near    .reg-date-main{color:var(--gold)}
.reg-date-near    .reg-date-rel{color:var(--gold);opacity:.7}
.reg-date-past    .reg-date-main{color:var(--text-lo)}
.reg-date-past    .reg-date-rel{color:var(--text-lo);opacity:.55}
.reg-date-ongoing .reg-date-main{color:var(--green)}
.reg-date-ongoing .reg-date-rel{color:var(--green);opacity:.65}
/* estimated dates: ~ prefix, italicised + slightly dimmed */
.reg-date-estimated .reg-date-main{font-style:italic;opacity:.8}
/* tooltip date detail sub-header */
.rdt-date-detail{
  margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);
  font-family:var(--font-display);font-size:9px;letter-spacing:.6px;
  color:var(--text-lo);line-height:1.7;
}
.rdt-date-detail-label{color:var(--text-mid);margin-right:4px}
.rdt-date-detail-ongoing{color:var(--green)}
.reg-title{font-weight:500;line-height:1.4}
.reg-jur{
  font-family:var(--font-display);font-size:9px;letter-spacing:.5px;
  text-transform:uppercase;color:var(--text-mid);white-space:nowrap;
}
.reg-inst{
  font-family:var(--font-display);font-size:9px;letter-spacing:.3px;
  color:var(--text-lo);
}
.reg-dir{
  font-family:var(--font-display);font-size:9px;letter-spacing:.5px;
  text-transform:uppercase;padding:2px 6px;border-radius:2px;
  white-space:nowrap;display:inline-block;
}
.reg-dir-bullish{color:var(--green);background:rgba(0,200,150,.1)}
.reg-dir-bearish{color:var(--hot);background:rgba(255,77,106,.1)}
.reg-dir-neutral{color:var(--text-lo);background:rgba(255,255,255,.04)}
.reg-dir-mixed{color:var(--gold);background:rgba(240,180,41,.1)}
.reg-conf{
  font-family:var(--font-display);font-size:9px;letter-spacing:.3px;
  text-transform:uppercase;color:var(--text-lo);
}
.reg-status{
  font-family:var(--font-display);font-size:9px;letter-spacing:.5px;
  text-transform:uppercase;padding:2px 7px;border-radius:2px;white-space:nowrap;
}
.reg-status-active{color:var(--green);background:rgba(0,200,150,.1)}
.reg-status-upcoming{color:var(--gold);background:rgba(240,180,41,.1)}
.reg-status-resolved{color:var(--text-lo);background:rgba(255,255,255,.04)}

/* ── Our read floating tip ── */
#reg-note-tip{
  display:none;position:fixed;z-index:1200;
  width:240px;
  background:#1a2d45;border:1px solid var(--border-strong);
  border-radius:4px;padding:10px 12px;
  pointer-events:none;
}
#reg-note-tip .rnt-head{
  font-family:var(--font-display);font-size:8px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--green);
  margin-bottom:6px;
}
#reg-note-tip .rnt-body{
  font-family:var(--font-body);font-size:11px;line-height:1.55;
  color:var(--text-hi);
}

.reg-summary{
  font-size:11px;color:var(--text-mid);line-height:1.5;
  max-width:300px;
}

/* ── Regulatory row click ── */
.reg-row{cursor:pointer}
.reg-card{cursor:pointer}

/* ── Regulatory detail tooltip ── */
.reg-detail-tooltip{
  position:fixed;z-index:1001;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:460px;max-width:calc(100vw - 24px);
  background:#0d1d32;
  border:1px solid rgba(0,200,150,.3);
  border-radius:6px;
  box-shadow:0 8px 40px rgba(0,0,0,.7),0 0 0 1px rgba(0,200,150,.05);
  overflow:hidden;
  animation:ttIn .15s ease-out;
}
.rdt-header{
  background:rgba(0,200,150,.06);
  border-bottom:1px solid rgba(0,200,150,.15);
  padding:14px 44px 12px 16px;position:relative;
}
.rdt-title{
  font-family:var(--font-body);font-size:13px;font-weight:700;
  letter-spacing:.3px;color:var(--text-hi);line-height:1.4;
  margin-bottom:7px;
}
.rdt-meta{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.rdt-jur{
  font-family:var(--font-display);font-size:13px;letter-spacing:.5px;
  text-transform:uppercase;color:var(--text-mid);
}
.rdt-sep{color:var(--text-lo);font-size:13px}
.rdt-instr{
  font-family:var(--font-display);font-size:13px;letter-spacing:.3px;
  color:var(--text-lo);
}
.rdt-date{
  font-family:var(--font-display);font-size:13px;letter-spacing:.3px;
  color:var(--text-lo);
}
.rdt-close{
  position:absolute;top:12px;right:12px;
  background:none;border:none;cursor:pointer;
  font-size:13px;color:var(--text-lo);padding:4px;
  transition:color .15s;
}
.rdt-close:hover{color:var(--text-hi)}
.rdt-meta-table{width:100%;border-collapse:collapse}
.rdt-meta-table td{
  padding:4px 0;font-family:var(--font-body);font-size:13px;
  color:var(--text-hi);vertical-align:middle;
}
.rdt-meta-table .rdt-mt-label{
  font-weight:700;width:110px;color:var(--text-hi);
}
.rdt-meta-table .reg-dir,
.rdt-meta-table .reg-conf,
.rdt-meta-table .reg-status{
  font-size:13px;letter-spacing:.3px;padding:2px 8px;
}
.rdt-body{
  padding:16px;
  max-height:55vh;overflow-y:auto;
}
.rdt-body::-webkit-scrollbar{width:4px}
.rdt-body::-webkit-scrollbar-track{background:transparent}
.rdt-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.rdt-section-label{
  font-family:var(--font-display);font-size:13px;letter-spacing:.5px;
  text-transform:uppercase;color:var(--green);
  margin-bottom:6px;
}
.rdt-summary{
  font-family:var(--font-body);font-size:13px;color:var(--text-hi);
  line-height:1.68;margin-bottom:16px;
}
.rdt-source{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text-lo);margin-top:14px;padding-top:10px;border-top:1px solid var(--border)}
.rdt-source a{color:inherit;text-decoration:none}
.rdt-source a:hover{text-decoration:underline}
.rdt-our-read{

<script>
'use strict';

// ── State ──
let DATA = null;
let activeTooltip = null;
let activeInstrument = null;
let tooltipSparkChart = null;

// ── Boot: load data ──
// data.json inlined by build.py — standalone file, no server needed
Promise.resolve(window.__CARBONSNAPS_DATA__)
  .then(data => {
    DATA = data;
    init();
  })
  .catch(err => {
    console.error('[CARBONsnaps] Failed to load data.json:', err);
    document.getElementById('loading-state').textContent =
      'Could not load CB_data.json. Please check the file exists in the same folder.';
  });

// ── Init ──
function init() {
  document.getElementById('loading-state').style.display = 'none';

  // Build date
  if (DATA._meta && DATA._meta.generated) {
    document.getElementById('build-date').textContent = DATA._meta.generated;
  }

  renderBriefing();
  renderInstruments();
  renderRegulatory();
  renderFooter();

  show('briefing-section');
  show('instruments-section');
  show('regulatory-section');
  show('site-footer');

  // Logo resets to default state
  document.querySelector('.logo').addEventListener('click', () => {
    closeBriefTooltip();
    closeTooltip();
    closeRegTooltip();
    closeGlossTooltip();
  });

  // Glossary blackout overlay click closes gloss tooltip
  document.getElementById('gloss-overlay').addEventListener('click', () => {
    closeGlossTooltip();
  });

  // Deep-link: open event from URL param e.g. ?event=REG-017
  const _urlEvent = new URL(window.location).searchParams.get('event');
  if (_urlEvent) {
    const _ev = (DATA.regulatory && DATA.regulatory.events || []).find(e => e.event_id === _urlEvent);
    if (_ev) openRegTooltip(_ev);
  }

  // Deep-link: open glossary term from hash e.g. #gloss-eu-ets
  handleGlossHash();

  // Digest modal — localhost only
  const _isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:';
  if (_isLocal) {
    document.getElementById('digest-open-btn').style.display = '';
    document.getElementById('digest-open-btn').addEventListener('click', openDigest);
  } else {
    document.getElementById('digest-open-btn').style.display = 'none';
  }
  document.getElementById('digest-modal-close').addEventListener('click', closeDigest);
  document.getElementById('digest-overlay').addEventListener('click', closeDigest);
  document.getElementById('digest-copy-btn').addEventListener('click', () => {
    const text = document.getElementById('digest-preview').textContent;
    const html = buildDigestHtml();
    const btn  = document.getElementById('digest-copy-btn');
    const markCopied = () => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy for Substack'; btn.classList.remove('copied'); }, 2000);
    };
    try {
      const item = new ClipboardItem({
        'text/html':  new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([text], { type: 'text/plain' }),
      });
      navigator.clipboard.write([item]).then(markCopied).catch(() => {
        navigator.clipboard.writeText(text).then(markCopied);
      });
    } catch (e) {
      navigator.clipboard.writeText(text).then(markCopied);
    }
  });

  // Glossary popup: swallow all clicks so they don't bubble to outsideClose/outsideBriefClose
  document.getElementById('gloss-tooltip').addEventListener('click', e => {
    e.stopPropagation();
  });
  document.getElementById('gt-close').addEventListener('click', e => {
    e.stopPropagation();
    closeGlossTooltip();
  });

  // gl-link events: hover on pointer devices, click on touch
  document.body.addEventListener('pointerenter', e => {
    const link = e.target.closest('.gl-link');
    if (!link || !_hasHover) return;
    _scheduleGlossShow(link.dataset.term, link);
  }, true);
  document.body.addEventListener('pointerleave', e => {
    const link = e.target.closest('.gl-link');
    if (!link || !_hasHover) return;
    _scheduleGlossHide();
  }, true);
  document.body.addEventListener('click', e => {
    const link = e.target.closest('.gl-link');
    if (!link) return;
    e.stopPropagation();
    if (!_hasHover) openGlossTooltip(link.dataset.term, null);
  });

  // Briefing icon clicks
  document.querySelectorAll('.brief-icon').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      showBriefTooltip(+el.dataset.idx);
    });
  });
  document.getElementById('bt-close').addEventListener('click', e => {
    e.stopPropagation();
    closeBriefTooltip();
  });
  document.getElementById('brief-overlay').addEventListener('click', () => {
    closeTooltip();
    closeRegTooltip();
  });
}

function show(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = '';
}

// ── Weekly briefing ──
const BRIEF_LABELS = ["This Week's Signal", "Where It's Showing Up", "What It Means"];
let activeBriefIdx = null;

function renderBriefing() {
  // If tooltip open, refresh its content for new level
  if (activeBriefIdx !== null) {
    showBriefTooltip(activeBriefIdx);
  }
}

function splitBody(raw) {
  if (!raw) return '';
  // Split on ". " before an uppercase letter; re-attach period to each sentence
  var parts = raw.split(/\. (?=[A-Z“‘"])/);
  if (parts.length <= 1) return '<p>' + linkifyStory(raw) + '</p>';
  return parts.map(function(s, i) {
    var sentence = (i < parts.length - 1) ? s + '.' : s;
    return '<p>' + linkifyStory(sentence.trim()) + '</p>';
  }).join('');
}

function showBriefTooltip(idx) {
  const stories = (DATA.globalStories && DATA.globalStories.cards) || [];
  const card = stories[idx];
  if (!card) return;
  activeBriefIdx = idx;

  const tt = document.getElementById('brief-tooltip');
  document.getElementById('bt-title').textContent  = card.headline || BRIEF_LABELS[idx] || '';
  const btBody = document.getElementById('bt-body');
  btBody.innerHTML  = splitBody(card.body || '');
  tt.scrollTop = 0;
  document.getElementById('bt-source').textContent = card.source ? '↗ Source: ' + card.source : '';

  // Position below the icons strip
  const icons = document.getElementById('briefing-icons');
  if (icons) {
    const r = icons.getBoundingClientRect();
    tt.style.top  = (r.bottom + 12) + 'px';
    tt.style.left = '50%';
  }

  tt.classList.add('active');
  document.addEventListener('click', outsideBriefClose);
}

function closeBriefTooltip() {
  activeBriefIdx = null;
  document.getElementById('brief-tooltip').classList.remove('active');
  document.removeEventListener('click', outsideBriefClose);
}

function outsideBriefClose(e) {
  const tt = document.getElementById('brief-tooltip');
  if (tt && !tt.contains(e.target) && !e.target.closest('.brief-icon')) {
    closeBriefTooltip();
  }
}


// ── Instruments ──
const MARKET_FAMILIES = [
  {
    key: 'Compliance',
    label: 'Compliance Markets',
    desc: 'Mandatory cap-and-trade and offsetting systems',
    color: 'var(--compliance)',
    bg: 'rgba(0,200,150,.10)',
  },
  {
    key: 'Clean Fuel',
    label: 'Clean Fuel Credits',
    desc: 'US and California clean fuel incentive programmes',
    color: 'var(--cleanfuel)',
    bg: 'rgba(240,180,41,.10)',
  },
  {
    key: 'Voluntary',
    label: 'Voluntary Carbon',
    desc: 'Voluntary offset markets and nature-based credits',
    color: 'var(--voluntary)',
    bg: 'rgba(124,156,191,.10)',
  },
];

function signalToDir(signal) {
  const s = (signal || '').toLowerCase();
  if (['bullish','bearish','mixed','neutral'].includes(s))
    return signal.charAt(0).toUpperCase() + signal.slice(1).toLowerCase();
  // Legacy weather string fallback
  const map = { sunny:'Bullish', cloudy:'Mixed', stormy:'Bearish', rainy:'Bearish', neutral:'Neutral' };
  return map[s] || 'Mixed';
}

function get52WeekRange(inst) {
  if (!inst.spark || inst.spark.length < 2) return null;
  const anchor = inst.last_updated ? new Date(inst.last_updated) : new Date();
  const cutoff = new Date(anchor);
  cutoff.setDate(cutoff.getDate() - 365);
  const points = inst.spark
    .filter(p => new Date(p.date) >= cutoff)
    .map(p => typeof p === 'object' ? p.close : p)
    .filter(v => typeof v === 'number' && isFinite(v));
  if (points.length < 2) return null;
  const low  = Math.min(...points);
  const high = Math.max(...points);
  const current = parseFloat(inst.price);
  if (isNaN(current) || high === low) return null;
  const pct = Math.max(2, Math.min(98, ((current - low) / (high - low)) * 100));
  return { low, high, current, pct };
}

function renderInstruments() {
  const container = document.getElementById('instruments-container');
  container.innerHTML = '';

  const box = document.createElement('div');
  box.className = 'inst-box';
  const table = document.createElement('table');
  table.className = 'inst-table';

  MARKET_FAMILIES.forEach(family => {
    const instruments = DATA.instruments.filter(i => i.market === family.key);
    if (!instruments.length) return;

    const hdr = document.createElement('tr');
    hdr.innerHTML = '<td colspan="5" class="inst-table-family" style="background:' + family.bg + '"><span class="inst-table-family-pip" style="background:' + family.color + '"></span>' + family.label + '</td>';
    table.appendChild(hdr);

    instruments.forEach(inst => {
      const sig = inst.regulatory_signal || 'Mixed';
      const dir = signalToDir(sig);
      const dirClass = dir.toLowerCase();
      const price = safePrice(inst.price);
      const isNoData = price === 'N/A';
      const range = get52WeekRange(inst);
      const rangeHtml = range
        ? `<div class="it-range-wrap">
             <div class="it-range-track">
               <div class="it-range-dot" style="left:${range.pct.toFixed(1)}%;background:${family.color}"></div>
             </div>
             <div class="it-range-labels">
               <span>${range.low % 1 === 0 ? range.low.toFixed(0) : range.low.toFixed(1)}</span>
               <span class="it-range-mid">52W</span>
               <span>${range.high % 1 === 0 ? range.high.toFixed(0) : range.high.toFixed(1)}</span>
             </div>
           </div>`
        : `<span class="it-range-unavail">no data</span>`;
      const tr = document.createElement('tr');
      tr.className = 'inst-row';
      tr.dataset.id = inst.id;
      tr.innerHTML =
        '<td class="it-id" style="color:' + family.color + '">' + escHtml(inst.id) + '</td>' +
        '<td class="it-name">' + escHtml(inst.name) + '</td>' +
        '<td class="it-price-cell">' +
          '<span class="it-price' + (isNoData ? ' no-data' : '') + '">' + price + '</span>' +
          '<span class="it-unit">' + (isNoData ? '' : escHtml(inst.price_unit)) + '</span>' +
        '</td>' +
        '<td class="it-range-cell">' + rangeHtml + '</td>' +
        '<td class="it-signal"><span class="reg-dir reg-dir-' + dirClass + '">' + dir + '</span></td>';
      table.appendChild(tr);
    });
  });

  box.appendChild(table);
  container.appendChild(box);

  table.addEventListener('click', e => {
    const row = e.target.closest('.inst-row');
    if (!row) return;
    const inst = DATA.instruments.find(i => i.id === row.dataset.id);
    if (!inst) return;
    openTooltip(inst);
  });
}

function renderTooltipSpark(inst) {
  if (!inst.spark || !inst.spark.length) return;
  // Small delay so the tooltip is fully in the DOM before Chart.js measures it
  setTimeout(() => {
    const canvas = document.getElementById('tt-spark');
    if (!canvas) return;

    const colorMap = {
      'Compliance': '#00c896',
      'Clean Fuel': '#f0b429',
      'Voluntary':  '#7c9cbf',
    };
    const color = colorMap[inst.market] || '#00c896';
    const fill  = hexToRgba(color, 0.08);

    // Set explicit pixel dimensions before Chart.js initialises
    canvas.width  = 388;
    canvas.height = 110;

    tooltipSparkChart = new Chart(canvas, {
      type: 'line',
      data: {
        labels: inst.spark.map((_, i) => i),
        datasets: [{
          data: inst.spark.map(p => typeof p === 'object' ? p.close : p),
          borderColor: color,
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          fill: true,
          backgroundColor: fill,
        }],
      },
      options: {
        responsive: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          x: {
            display: true,
            labels: inst.spark.map(p => p.date || ''),
            ticks: {
              maxTicksLimit: 6,
              maxRotation: 0,
              font: { size: 9 },
              color: 'rgba(255,255,255,0.35)',
              callback: function(val, idx, ticks) {
                const raw = inst.spark[val] ? (inst.spark[val].date || '') : (inst.spark[idx] ? inst.spark[idx].date || '' : '');
                return raw.slice(0,7);
              }
            },
            grid: { color: 'rgba(255,255,255,0.04)', drawTicks: false },
            border: { display: false },
          },
          y: {
            display: true,
            position: 'right',
            ticks: {
              maxTicksLimit: 5,
              font: { size: 9 },
              color: 'rgba(255,255,255,0.35)',
              callback: v => v >= 1000 ? (v/1000).toFixed(1)+'k' : v.toFixed(0),
              padding: 4,
            },
            grid: { color: 'rgba(255,255,255,0.04)', drawTicks: false },
            border: { display: false },
          },
        },
        animation: false,
      },
    });

    // ── Crosshair hover overlay ──
    const hoverLine = document.getElementById('tt-spark-hover');
    const pill      = document.getElementById('tt-spark-pill');
    const wrap      = canvas.parentElement;
    const prices    = inst.spark.map(p => typeof p === 'object' ? p.close : p);
    const dates     = inst.spark.map(p => (typeof p === 'object' && p.date) ? p.date : '');

    function showCrosshair(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      if (x < 0 || x > rect.width) { hoverLine.style.display = 'none'; return; }

      // Find nearest data point
      const chartArea = tooltipSparkChart.chartArea;
      const pct = Math.max(0, Math.min(1, (x - chartArea.left) / (chartArea.right - chartArea.left)));
      const idx = Math.round(pct * (prices.length - 1));
      const price = prices[idx];
      const date  = dates[idx] || '';
      if (price == null) return;

      // Position crosshair line (relative to wrap, offset by 16px left padding)
      const wrapRect = wrap.getBoundingClientRect();
      const lineX = clientX - wrapRect.left;
      hoverLine.style.left  = lineX + 'px';
      hoverLine.style.display = 'block';

      // Format price
      const priceStr = price >= 1000 ? (price/1000).toFixed(2)+'k' : price.toFixed(2);
      const dateStr  = date.slice(0,10);
      pill.innerHTML = `<span class="shp-price">${priceStr}</span><span class="shp-date">${dateStr}</span>`;

      // Flip pill left/right so it stays in bounds
      const pillW = 80;
      pill.style.left = (lineX + wrapRect.width - wrapRect.left > wrapRect.width - pillW - 10)
        ? (-pillW - 4) + 'px' : '6px';
    }

    canvas.addEventListener('mousemove', e => showCrosshair(e.clientX, e.clientY));
    canvas.addEventListener('mouseleave', () => { hoverLine.style.display = 'none'; });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      showCrosshair(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    canvas.addEventListener('touchend', () => { hoverLine.style.display = 'none'; });
  }, 0);
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

let regSortDir = 'asc';

const REG_COLS = [

  { key:'direction',            label:'Dir',   icon:'🧭', tip:'Direction: expected price impact if the event proceeds as anticipated' },
  { key:'confidence',           label:'Conf',  icon:'🎯', tip:'Confidence: how certain we are of the timing and outcome' },
  { key:'status',               label:'Status',icon:'🚦', tip:'Status: Active (in progress), Upcoming (scheduled), Decided (concluded)' },
];

const SORT_ORDER = {
  direction:  ['Bullish','Mixed','Neutral','Bearish'],
  confidence: ['High','Medium','Low'],
  magnitude:  ['High','Medium','Low'],

function parseSortDate(val) {
  if (!val) return '9999-12-31';
  var dmy = val.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (dmy) return dmy[3] + '-' + dmy[2] + '-' + dmy[1];
  if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
  var qm = val.match(/^(\d{4})-Q([1-4])$/);
  if (qm) { var qe = ['03-31','06-30','09-30','12-31']; return qm[1] + '-' + qe[+qm[2]-1]; }
  var hm = val.match(/^(\d{4})-H([12])$/);
  if (hm) return hm[1] + (hm[2] === '1' ? '-06-30' : '-12-31');
  var mom = val.match(/^(\d{4})-(\d{2})$/);
  if (mom) return mom[0] + '-01';
  if (/COP31/i.test(val)) return '2026-11-30';
  if (/^\d{4}$/.test(val)) return val + '-12-31';
  return '9999-12-31';
}

// ── Date display helpers ──
var _MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function isEstimatedDate(val) {
  if (!val) return false;
  return /^(\d{4})-Q[1-4]$/.test(val) ||
         /^(\d{4})-H[12]$/.test(val)  ||
         /^(\d{4})-(\d{2})$/.test(val)||
         /^\d{4}$/.test(val);
}

function formatDisplayDate(val) {
  if (!val) return '\u2014';
  var prefix = isEstimatedDate(val) ? '~' : '';
  // DD/MM/YYYY -> D Mon YYYY (concrete)
  var dmy = val.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (dmy) return parseInt(dmy[1],10) + ' ' + _MON[parseInt(dmy[2],10)-1] + ' ' + dmy[3];
  // Quarter -> start of quarter
  var qm = val.match(/^(\d{4})-Q([1-4])$/);
  if (qm) { var qd = ['1 Jan','1 Apr','1 Jul','1 Oct']; return prefix + qd[+qm[2]-1] + ' ' + qm[1]; }
  // Half-year -> start of half
  var hm = val.match(/^(\d{4})-H([12])$/);
  if (hm) return prefix + (hm[2] === '1' ? '1 Jan ' : '1 Jul ') + hm[1];
  // Month only YYYY-MM -> 1 Mon YYYY
  var mom = val.match(/^(\d{4})-(\d{2})$/);
  if (mom) return prefix + '1 ' + _MON[parseInt(mom[2],10)-1] + ' ' + mom[1];
  // ISO YYYY-MM-DD
  var iso = val.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (iso) return parseInt(iso[3],10) + ' ' + _MON[parseInt(iso[2],10)-1] + ' ' + iso[1];
  // Year only
  if (/^\d{4}$/.test(val)) return prefix + '1 Jan ' + val;
  return val;
}

function rawDateLabel(val) {
  // Human-readable version of the original raw value for tooltip display
  if (!val) return '';
  var qm = val.match(/^(\d{4})-Q([1-4])$/);
  if (qm) return 'Q' + qm[2] + ' ' + qm[1];
  var hm = val.match(/^(\d{4})-H([12])$/);
  if (hm) return 'H' + hm[2] + ' ' + hm[1];
  var mom = val.match(/^(\d{4})-(\d{2})$/);
  if (mom) return _MON[parseInt(mom[2],10)-1] + ' ' + mom[1];
  if (/^\d{4}$/.test(val)) return val;
  return formatDisplayDate(val); // concrete — same as display
}

function daysUntil(val) {
  var iso = parseSortDate(val);
  if (iso === '9999-12-31') return null;
  var today = new Date(); today.setHours(0,0,0,0);
  return Math.round((new Date(iso) - today) / 86400000);
}

function relativeLabel(days) {
  if (days === null) return null;
  if (days < -1)   return Math.abs(days) + 'd ago';
  if (days < 0)    return 'yesterday';
  if (days === 0)  return 'today';
  if (days <= 13)  return 'in ' + days + 'd';
  if (days <= 89)  return 'in ' + Math.round(days/7) + 'w';
  if (days <= 364) return 'in ' + Math.round(days/30) + 'mo';
  return 'in ~' + Math.round(days/365) + 'y';
}

function dateUrgencyClass(val, status) {
  var d = daysUntil(val);
  if (d === null) return '';
  if (d < 0) return (status || '').toLowerCase() === 'active' ? 'reg-date-ongoing' : 'reg-date-past';
  if (d <= 30) return 'reg-date-urgent';
  if (d <= 90) return 'reg-date-near';
  return '';
}

function dateCell(val, status) {
  var urgency  = dateUrgencyClass(val, status);
  var estimated = isEstimatedDate(val) ? ' reg-date-estimated' : '';
  var d   = daysUntil(val);
  var rel = relativeLabel(d);
  var ongoing = urgency === 'reg-date-ongoing';
  var relText = ongoing ? 'Ongoing' : (rel || '');
  var cls = 'reg-date' + (urgency ? ' '+urgency : '') + estimated;
  return '<td class="' + cls + '">' +
    '<span class="reg-date-main">' + escHtml(formatDisplayDate(val)) + '</span>' +
    (relText ? '<span class="reg-date-rel">' + escHtml(relText) + '</span>' : '') +
    '</td>';
}

function dateDetailHtml(val, status) {
  if (!val) return '';
  var d = daysUntil(val);
  var ongoing = d !== null && d < 0 && (status || '').toLowerCase() === 'active';
  var estimated = isEstimatedDate(val);
  var rel = relativeLabel(d);
  if (ongoing) {
    return '<div class="rdt-date-detail">' +
      '<span class="rdt-date-detail-ongoing">\u25CF Ongoing</span>' +
      ' \u00B7 started ' + escHtml(formatDisplayDate(val)) +
      (estimated ? ' <em>(estimated start)</em>' : '') +
      '</div>';
  }
  var html = '<div class="rdt-date-detail">';
  html += '<span class="rdt-date-detail-label">&#128197; Key date</span>';
  if (estimated) {
    html += escHtml(rawDateLabel(val));
    html += ' \u00B7 <span class="rdt-date-detail-label">Earliest</span>' + escHtml(formatDisplayDate(val));
  } else {
    html += escHtml(formatDisplayDate(val));
  }
  if (rel) html += ' \u00B7 ' + escHtml(rel);
  html += '</div>';
  return html;
}

    (_cl.changes || [])

      .map(c => c.id)

  const sorted = [...regEvents].sort((a, b) => {

      av = Array.isArray(a.instruments_affected) ? a.instruments_affected.join(',') : (a.instruments_affected || '');
      bv = Array.isArray(b.instruments_affected) ? b.instruments_affected.join(',') : (b.instruments_affected || '');

      av = parseSortDate(a.next_date);
      bv = parseSortDate(b.next_date);

      bv = b[regSortCol] || '';

      const an = ai === -1 ? 999 : ai, bn = bi === -1 ? 999 : bi;

let activeRegTooltip = null;

function openRegTooltip(ev) {
  closeRegTooltip();

  const dir = (ev.direction || '').toLowerCase();
  const status = (ev.status || '').toLowerCase();
  const instr = Array.isArray(ev.instruments_affected)
    ? ev.instruments_affected.join(', ')

  const summaryBlock = ev.summary
    ? `<div class="rdt-section-label">Summary</div>

    : '';
  const noteBlock = ev.analyst_note
    ? `<div class="rdt-section-label">Our Read</div>
       <div class="rdt-our-read">${escHtml(ev.analyst_note)}</div>`
    : '';
  const sourceBlock = ev.source_label
    ? `<div class="rdt-source">↗ Source: ${
        ev.source_url
          ? `<a href="${escHtml(ev.source_url)}" target="_blank" rel="noopener noreferrer">${escHtml(ev.source_label)}</a>`
          : escHtml(ev.source_label)
      }</div>`
    : '';

  let scenariosBlock = '';
  if (ev.scenarios && ev.scenarios.length === 3) {
    const TRACK_H = 72;
    const order = ['bear', 'base', 'bull'];
    const maxProb = Math.max(...ev.scenarios.map(s => s.probability));

    const cols = order.map(c => {
      const s = ev.scenarios.find(x => x.case === c);
      if (!s) return '';
      const barH = Math.round((s.probability / maxProb) * TRACK_H);
      return `<td class="rdt-scenario-col">
        <div class="rdt-scenario-track" style="height:${TRACK_H}px">
          <div class="rdt-scenario-bar bar-${escHtml(c)}" style="height:${barH}px"></div>
          <span class="rdt-scenario-pct pct-${escHtml(c)}" style="bottom:${barH + 2}px">${s.probability}%</span>
        </div>
        <span class="rdt-scenario-pill pill-${escHtml(c)}">${escHtml(c)}</span>
        <div class="rdt-scenario-rationale">${escHtml(s.rationale)}</div>
      </td>`;
    }).join('');

    const baseScenario = ev.scenarios.find(x => x.case === 'base');
    let impactTags = '';
    if (baseScenario && baseScenario.price_impact) {
      impactTags = Object.entries(baseScenario.price_impact)
        .map(([k, v]) => `<span class="rdt-impact-tag"><span class="rdt-it-key">${escHtml(k)}</span>${escHtml(v)}</span>`)
        .join('');
    }

    scenariosBlock = `
      <div class="rdt-scenarios">
        <div class="rdt-section-label">Scenarios</div>
        ${(ev.confidence || ev.magnitude) ? `<div class="rdt-cal-row">
          ${ev.confidence ? `<span class="rdt-cal-tag rdt-cal-${escHtml((ev.confidence||'').toLowerCase())}"><span>Conf</span>${escHtml(ev.confidence)}</span>` : ''}
          ${ev.magnitude  ? `<span class="rdt-cal-tag rdt-cal-${escHtml((ev.magnitude||'').toLowerCase())}"><span>Magnitude</span>${escHtml(ev.magnitude)}</span>`  : ''}
        </div>` : ''}
        <table class="rdt-scenario-table"><tr>${cols}</tr></table>
        ${impactTags ? `<div class="rdt-scenario-impacts">${impactTags}</div>` : ''}
        <div class="rdt-scenario-note">Scenarios AI-generated from public sources and editorial context. Probabilities are indicative.</div>
      </div>`;
  }

  const tt = document.createElement('div');
  tt.className = 'reg-detail-tooltip';
  tt.innerHTML = `
    <div class="rdt-header">
      <div class="rdt-title">${escHtml(ev.title || '')}</div>
      <div class="rdt-meta">
        <span class="rdt-jur">${escHtml(ev.jurisdiction || '')}</span>
        ${instr ? `<span class="rdt-sep">&middot;</span><span class="rdt-instr">${escHtml(instr)}</span>` : ''}
        ${ev.next_date ? `<span class="rdt-sep">&middot;</span><span class="rdt-date">${escHtml(formatDisplayDate(ev.next_date))}</span>` : ''}
      </div>
      ${dateDetailHtml(ev.next_date || '', ev.status || '')}
      <button class="rdt-close">&#10005;</button>
    </div>

    <div class="rdt-body">${summaryBlock}${noteBlock}${scenariosBlock}${sourceBlock}</div>`;

  document.body.appendChild(tt);
  activeRegTooltip = tt;
  document.getElementById('brief-overlay').classList.add('active');

  // Update URL so this event can be bookmarked / shared
  const url = new URL(window.location);
  url.searchParams.set('event', ev.event_id);
  history.replaceState(null, '', url);

  tt.querySelector('.rdt-close').addEventListener('click', e => {
    e.stopPropagation();
    closeRegTooltip();
  });

  setTimeout(() => {
    document.addEventListener('click', outsideRegClose);
  }, 10);
}

function closeRegTooltip() {
  if (activeRegTooltip) {
    activeRegTooltip.remove();
    activeRegTooltip = null;
  }
  // Clear event param from URL
  const url = new URL(window.location);
  if (url.searchParams.has('event')) {
    url.searchParams.delete('event');
    history.replaceState(null, '', url);
  }
  // Only remove overlay if instrument tooltip also closed
  if (!activeTooltip) {
    document.getElementById('brief-overlay').classList.remove('active');
  }
  document.removeEventListener('click', outsideRegClose);
}

function outsideRegClose(e) {
  if (activeRegTooltip && !activeRegTooltip.contains(e.target)) {
    closeRegTooltip();
  }
}

// ── Email digest ──
function buildDigestText() {
  const meta  = DATA._meta || {};
  const built = meta.generated || new Date().toISOString().slice(0, 10);
  const lines = [];

  // Header — title: "CARBONsnaps — DD Month YYYY", subtitle: first story headline
  const builtDate = new Date(built + 'T00:00:00');
  const titleDate = builtDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
  lines.push('CARBONsnaps \u2014 ' + titleDate);
  const firstCard = ((DATA.globalStories && DATA.globalStories.cards) || [])[0];
  if (firstCard && (firstCard.headline || firstCard.label)) {
    lines.push(firstCard.headline || firstCard.label);
  }
  lines.push('');
  lines.push('\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500');
  lines.push('');

  // Global stories
  const cards = (DATA.globalStories && DATA.globalStories.cards) || [];
  if (cards.length) {
    lines.push('THIS WEEK');
    lines.push('');
    cards.forEach(card => {
    lines.push(card.headline || card.label || '');
      lines.push(card.body || '');
      if (card.source) lines.push('Source: ' + card.source);
      lines.push('');
    });
    lines.push('─────────────────────────────────────────');
    lines.push('');
  }

  // Changelog
  const cl = (DATA.regulatory && DATA.regulatory.changelog) || {};
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  const cutoffStr = cutoff.toISOString().slice(0, 10);
  const recent = (cl.changes || []).filter(c => (c.week || '') >= cutoffStr);

  if (recent.length) {
    lines.push('WHAT CHANGED THIS WEEK');
    lines.push('');
    const CHANGE_LABELS = { new_event:'New event', status:'Status change', date:'Date revised', direction:'Direction change', note:'Analyst note updated' };
    recent.forEach(c => {
      const what = CHANGE_LABELS[c.change_type] || c.change_type;
      const sig  = c.significance === 'high' ? ' [HIGH]' : c.significance === 'medium' ? ' [MED]' : '';
      const fromTo = (c.from && c.to) ? '  ' + c.from + ' -> ' + c.to : '';
      lines.push(c.id + '  ' + what + sig);
      lines.push(c.title + fromTo);
      lines.push('');
    });
    lines.push('─────────────────────────────────────────');
    lines.push('');
  }

  // Next 30 days
  const upcoming = (DATA.regulatory && DATA.regulatory.events || [])
    .map(ev => ({ ev, d: daysUntil(ev.next_date) }))
    .filter(({ d }) => d !== null && d >= 0 && d <= 30)
    .sort((a, b) => a.d - b.d);

  if (upcoming.length) {
    lines.push('COMING UP IN THE NEXT 30 DAYS');
    lines.push('');
    upcoming.forEach(({ ev, d }) => {
      const rel   = relativeLabel(d) || '';
      const instr = Array.isArray(ev.instruments_affected)
        ? ev.instruments_affected.join(', ')
        : (ev.instruments_affected || '');
      lines.push(formatDisplayDate(ev.next_date) + '  (' + rel + ')');
      lines.push(ev.title + (instr ? '  [' + instr + ']' : '') + '  ' + (ev.direction || ''));
      if (ev.summary) lines.push(ev.summary);
      lines.push('');
    });
    lines.push('─────────────────────────────────────────');
    lines.push('');
  }

  lines.push('CARBONsnaps \u2014 carbonsnaps.com');
  lines.push('Environmental Commodity Intelligence');

  return lines.join('\n');
}

// ── Glossary slug — converts a term to a URL hash fragment ──
function glossSlug(term) {
  return 'gloss-' + term.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
}

// ── Linkify for digest HTML — first-occurrence glossary links with slugged hash ──
function linkifyDigest(rawText) {
  if (!rawText) return escHtml(rawText);
  const pairs = [];
  GLOSSARY_TERMS.forEach(entry => {
    entry.aliases.forEach(alias => { pairs.push({ alias, term: entry.term }); });
  });
  pairs.sort((a, b) => b.alias.length - a.alias.length);
  let text = escHtml(rawText);
  const linked = new Set();
  pairs.forEach(({ alias, term }) => {
    if (linked.has(term)) return;
    const esc = alias.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re  = new RegExp('(?<![\\w-])(' + esc + ')(?![\\w-])', 'i');
    if (re.test(text)) {
      text = text.replace(re, (_m, match) => {
        linked.add(term);
        const href = 'https://carbonsnaps.com/#' + glossSlug(term);
        return '<a href="' + href + '" style="color:#00c896;text-decoration:underline">' + match + '</a>';
      });
    }
  });
  return text;
}

// ── Digest HTML (for clipboard rich-text paste into Substack) ──
function buildDigestHtml() {
  const meta  = DATA._meta || {};
  const built = meta.generated || new Date().toISOString().slice(0, 10);
  const builtDate = new Date(built + 'T00:00:00');
  const titleDate = builtDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });

  const esc = escHtml;
  const p   = s => '<p>' + s + '</p>';
  const hr  = '<hr style="border:none;border-top:1px solid #ccc;margin:16px 0">';
  const parts = [];

  parts.push('<h1>' + esc('CARBONsnaps \u2014 ' + titleDate) + '</h1>');
  const firstCard = ((DATA.globalStories && DATA.globalStories.cards) || [])[0];
  if (firstCard && (firstCard.headline || firstCard.label)) {
    parts.push('<h2>' + esc(firstCard.headline || firstCard.label) + '</h2>');
  }
  parts.push(hr);

  const cards = (DATA.globalStories && DATA.globalStories.cards) || [];
  if (cards.length) {
    parts.push('<h3>THIS WEEK</h3>');
    cards.forEach(card => {
      parts.push('<h4>' + esc(card.headline || card.label || '') + '</h4>');
      parts.push(p(linkifyDigest(card.body || '')));
      if (card.source) parts.push('<p><em>Source: ' + esc(card.source) + '</em></p>');
    });
    parts.push(hr);
  }

  const cl = (DATA.regulatory && DATA.regulatory.changelog) || {};
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  const cutoffStr = cutoff.toISOString().slice(0, 10);
  const recent = (cl.changes || []).filter(c => (c.week || '') >= cutoffStr);
  if (recent.length) {
    parts.push('<h3>WHAT CHANGED THIS WEEK</h3>');
    const CHANGE_LABELS = { new_event:'New event', status:'Status change', date:'Date revised', direction:'Direction change', note:'Analyst note updated' };
    recent.forEach(c => {
      const what   = CHANGE_LABELS[c.change_type] || c.change_type;
      const sig    = c.significance === 'high' ? ' <strong>[HIGH]</strong>' : c.significance === 'medium' ? ' [MED]' : '';
      const fromTo = (c.from && c.to) ? '  ' + esc(c.from) + ' &rarr; ' + esc(c.to) : '';
      parts.push(p('<strong>' + esc(c.id) + '  ' + esc(what) + '</strong>' + sig));
      parts.push(p(esc(c.title) + fromTo));
    });
    parts.push(hr);
  }

  const upcoming = (DATA.regulatory && DATA.regulatory.events || [])
    .map(ev => ({ ev, d: daysUntil(ev.next_date) }))
    .filter(({ d }) => d !== null && d >= 0 && d <= 30)
    .sort((a, b) => a.d - b.d);
  if (upcoming.length) {
    parts.push('<h3>COMING UP IN THE NEXT 30 DAYS</h3>');
    upcoming.forEach(({ ev, d }) => {
      const rel   = relativeLabel(d) || '';
      const instr = Array.isArray(ev.instruments_affected)
        ? ev.instruments_affected.join(', ')
        : (ev.instruments_affected || '');
      parts.push(p('<strong>' + esc(formatDisplayDate(ev.next_date)) + '  (' + esc(rel) + ')</strong>'));
      parts.push(p(esc(ev.title) + (instr ? '  [' + esc(instr) + ']' : '') + '  ' + esc(ev.direction || '')));
      if (ev.summary) parts.push(p(linkifyDigest(ev.summary)));
    });
    parts.push(hr);
  }

  parts.push(p('<a href="https://carbonsnaps.com" style="color:#00c896">CARBONsnaps</a> \u2014 Environmental Commodity Intelligence'));
  return '<!DOCTYPE html><html><body style="font-family:sans-serif;max-width:640px;margin:0 auto">' + parts.join('\n') + '</body></html>';
}

function handleGlossHash() {
  const hash = (location.hash || '').replace(/^#/, '');
  if (!hash.startsWith('gloss-')) return;
  const slug = hash.slice(6); // strip 'gloss-'
  const entry = GLOSSARY_TERMS.find(e => glossSlug(e.term) === 'gloss-' + slug);
  if (entry) openGlossTooltip(entry.term, null);
}

// ── Changelog banner ──
function renderChangelog() {
  const container = document.getElementById('reg-changelog');
  if (!container) return;

  const cl = (DATA.regulatory && DATA.regulatory.changelog) || {};
  const changes = cl.changes || [];

  // Only show changes from the last 7 days
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);
  const cutoffStr = cutoff.toISOString().slice(0, 10);
  const recent = changes.filter(c => (c.week || '0000-00-00') >= cutoffStr);

  if (!recent.length) {
    container.innerHTML = '';
    return;
  }

  const high = recent.filter(c => c.significance === 'high').length;
  const sigText = high > 0 ? ` · ${high} high-significance` : '';
  const n = recent.length;
  const bannerText = `${n} change${n > 1 ? 's' : ''} this week${sigText}`;

  // Build entry rows
  const CHANGE_LABELS = {
    new_event: 'New',
    status:    'Status',
    date:      'Date',
    direction: 'Direction',
    note:      'Note',
  };

  const rows = recent.map(c => {
    const sigCls = 'cl-sig-' + (c.significance || 'low');
    const sigLabel = {high:'HIGH', medium:'MED', low:'LOW'}[c.significance] || 'LOW';
    const what = CHANGE_LABELS[c.change_type] || c.change_type;
    const fromTo = (c.from && c.to) ? `${escHtml(c.from)} &rarr; ${escHtml(c.to)}` : '';
    return `<div class="cl-entry" data-eid="${escAttr(c.id || '')}">
      <span class="cl-sig ${sigCls}">${sigLabel}</span>
      <span class="cl-eid">${escHtml(c.id || '')}</span>
      <span class="cl-what">${escHtml(what)}</span>
      <span class="cl-title">${escHtml(c.title || '')}</span>
      ${fromTo ? `<span class="cl-from-to">${fromTo}</span>` : ''}
    </div>`;
  }).join('');

  container.innerHTML = `
    <div class="cl-banner" id="cl-banner">
      <div class="cl-banner-bar" id="cl-banner-bar">
        <span class="cl-banner-dot"></span>
        <span class="cl-banner-text">${escHtml(bannerText)}</span>
        <span class="cl-banner-toggle" id="cl-toggle">Show ▼</span>
      </div>
      <div class="cl-entries" id="cl-entries">${rows}</div>
    </div>`;

  // Toggle open/close
  document.getElementById('cl-banner-bar').addEventListener('click', () => {
    const entries = document.getElementById('cl-entries');
    const tog = document.getElementById('cl-toggle');
    const open = entries.classList.toggle('open');
    tog.textContent = open ? 'Hide ▲' : 'Show ▼';
  });

  // Entry click -> open event detail tooltip
  document.getElementById('cl-entries').addEventListener('click', e => {
    const entry = e.target.closest('.cl-entry');
    if (!entry) return;
    const eid = entry.dataset.eid;
    const ev = regEvents.find(r => r.event_id === eid);
    if (ev) openRegTooltip(ev);
  });

  // Mark updated rows in the reg table with a dot
  const updatedIds = new Set(recent.map(c => c.id));
  document.querySelectorAll('.reg-row').forEach(row => {
    if (updatedIds.has(row.dataset.eid)) {
      const titleCell = row.querySelector('.reg-title');
      if (titleCell && !titleCell.querySelector('.reg-updated-dot')) {
        titleCell.insertAdjacentHTML('beforeend', '<span class="reg-updated-dot" title="Updated this week"></span>');
      }
    }
  });
}

}


function closeTooltip() {
  if (tooltipSparkChart) {
    tooltipSparkChart.destroy();
    tooltipSparkChart = null;
  }
  if (activeTooltip) {
    activeTooltip.remove();
    activeTooltip = null;
    activeInstrument = null;
  }
  document.getElementById('brief-overlay').classList.remove('active');
  document.removeEventListener('click', outsideClose);
}

function outsideClose(e) {

// ── Linkify: wrap glossary terms in <a class="gl-link"> ──
function linkifyStory(rawText) {
  if (!rawText) return '';
  // Build sorted alias list (longest first to avoid partial matches)
  const pairs = [];
  GLOSSARY_TERMS.forEach(entry => {
    entry.aliases.forEach(alias => {
      pairs.push({ alias, term: entry.term });
    });
  });
  pairs.sort((a, b) => b.alias.length - a.alias.length);

  // Work on escaped HTML to avoid double-escaping
  let text = escHtml(rawText);

  // Track which terms have already been linked (first occurrence only)
  const linked = new Set();

  pairs.forEach(({ alias, term }) => {
    if (linked.has(term)) return;
    // Case-insensitive, whole-word-ish match (word boundary or punctuation boundary)
    const escaped = alias.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('(?<![\\w-])(' + escaped + ')(?![\\w-])', 'i');
    if (re.test(text)) {
      text = text.replace(re, (_m, match) => {
        linked.add(term);
        return '<a class="gl-link" data-term="' + escAttr(term) + '">' + match + '</a>';
      });
    }
  });
  return text;
}

function escAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

// ── Glossary popup ──
let activeGlossTerm = null;
let _glossShowTimer = null;
let _glossHideTimer = null;
const _hasHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

function _glossPopoverPosition(anchorEl) {
  const tt = document.getElementById('gloss-tooltip');
  const r  = anchorEl.getBoundingClientRect();
  const W  = 280;
  const M  = 10; // margin from viewport edge
  // Horizontal: centre on anchor, clamp
  let left = r.left + r.width / 2 - W / 2;
  left = Math.max(M, Math.min(left, window.innerWidth - W - M));
  // Vertical: prefer above, fall back to below
  // Temporarily show off-screen to measure height
  tt.style.visibility = 'hidden';
  tt.style.display = '';
  const ttH = tt.offsetHeight || 180;
  tt.style.visibility = '';
  const spaceAbove = r.top - M;
  const top = spaceAbove >= ttH + 8 ? r.top - ttH - 8 : r.bottom + 8;
  tt.style.left = left + 'px';
  tt.style.top  = (top + window.scrollY) + 'px';
}

function openGlossTooltip(termKey, anchorEl) {
  const entry = GLOSSARY_TERMS.find(e => e.term === termKey);
  if (!entry) return;
  activeGlossTerm = termKey;

  document.getElementById('gt-term').textContent = entry.term;
  renderGlossBody(entry);

  const tt = document.getElementById('gloss-tooltip');

  if (_hasHover && anchorEl) {
    _glossPopoverPosition(anchorEl);
    tt.style.display = '';
    // Allow mouse to enter tooltip and cancel hide
    tt.addEventListener('mouseenter', _glossTtEnter);
    tt.addEventListener('mouseleave', _glossTtLeave);
  } else {
    // Touch/modal mode (also used for hash deep-links where anchorEl is null)
    tt.style.top = '50%';
    tt.style.left = '50%';
    tt.style.transform = 'translate(-50%,-50%)';
    tt.style.display = '';
    document.getElementById('gloss-overlay').classList.add('active');
    setTimeout(() => {
      document.addEventListener('click', outsideGlossClose);
    }, 10);
  }
}

function _glossTtEnter() {
  clearTimeout(_glossHideTimer);
  _glossHideTimer = null;
}
function _glossTtLeave() {
  _scheduleGlossHide();
}

function renderGlossBody(entry) {
  if (!entry) return;
  const body = document.getElementById('gt-body');
  if (body) body.textContent = entry.expert || '';
}

function closeGlossTooltip() {
  clearTimeout(_glossShowTimer);
  clearTimeout(_glossHideTimer);
  _glossShowTimer = null;
  _glossHideTimer = null;
  activeGlossTerm = null;
  const tt = document.getElementById('gloss-tooltip');
  if (tt) {
    tt.style.display = 'none';
    tt.removeEventListener('mouseenter', _glossTtEnter);
    tt.removeEventListener('mouseleave', _glossTtLeave);
  }
  document.getElementById('gloss-overlay').classList.remove('active');
  document.removeEventListener('click', outsideGlossClose);
}

function _scheduleGlossShow(termKey, anchorEl) {
  clearTimeout(_glossHideTimer);
  _glossHideTimer = null;
  if (_glossShowTimer) return;
  _glossShowTimer = setTimeout(() => {
    _glossShowTimer = null;
    openGlossTooltip(termKey, anchorEl);
  }, 150);
}

function _scheduleGlossHide() {
  clearTimeout(_glossShowTimer);
  _glossShowTimer = null;
  if (_glossHideTimer) return;
  _glossHideTimer = setTimeout(() => {
    _glossHideTimer = null;
    closeGlossTooltip();
  }, 200);
}

function outsideGlossClose(e) {
  const tt = document.getElementById('gloss-tooltip');
  if (tt && !tt.contains(e.target) && !e.target.closest('.gl-link')) {
    closeGlossTooltip();
  }
}

// ── Helpers ──
function safePrice(val) {
  if (!val || val === '\u2014' || val === 'n/a') return 'N/A';
  return String(val);
}

function parseChange(str) {
  if (!str) return { cls: 'neutral' };
  const n = parseFloat(str);
  if (isNaN(n)) return { cls: 'neutral' };
  return { cls: n > 0 ? 'positive' : n < 0 ? 'negative' : 'neutral' };
}

function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
